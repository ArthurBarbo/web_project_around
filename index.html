<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lugares ao redor do USA" />
    <meta name="Author" content="Arthur Oliveira" />
    <meta name="Keywords" content="redes sociais,U.S.A,tripleten,Paisagens" />
    <title>Around Us</title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body class="page">
    <header class="header page__section">
      <img
        class="header__vetor"
        src="./images/header_around.svg"
        alt="'Around the Us' escrito em branco"
      />
    </header>
    <main class="main page__section">
      <section class="profile">
        <img
          class="profile__avatar"
          src="./images/avatar.jpg"
          alt="Jacques Cousteau, foto de perfil"
        />
        <div class="profile__text">
          <h1 class="profile__name">Jacques Cousteau</h1>
          <button
            class="profile__pen"
            type="button"
            aria-label="edit profile"
          ></button>
          <h2 class="profile__description">Explorador</h2>
        </div>
        <button
          class="profile__plus"
          type="button"
          aria-label="edit card"
        ></button>
      </section>
      <section class="Elements">
        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/vale__.jpg"
            alt="Vale de Yosemite"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Vale de Yosemite</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>

        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/Lago_louise.png"
            alt="Lago Louise"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Lago Louise</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>

        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/montanhas_care.png"
            alt="Montanhas"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Montanhas Carecas</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>

        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/latemar.png"
            alt="Latemar"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Latemar</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>

        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/parque_nacional.png"
            alt="Parque Nacional"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Parque nacional da Vanoise</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>

        <article class="Elements__card">
          <img
            class="Elements__image"
            src="./images/Lago_di_braies.png"
            alt="Lago di Braies,Itália"
          />
          <div class="Elements__caption">
            <p class="Elements__text">Lago di Braies</p>
            <button
              class="Elements__like"
              type="button"
              aria-label="Like"
            ></button>
          </div>
        </article>
      </section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">© 2025 Around The U.S.</p>
    </footer>
    <div class="popup popup-hidden">
      <div class="popup__conteiner">
        <button
          class="popup__close"
          id="close"
          type="button"
          aria-label="close form"
        ></button>
        <h2 class="popup__text">Editar perfil</h2>
        <form class="popup__profile">
          <label for="name"></label>
          <input
            class="popup__name"
            type="text"
            id="name"
            placeholder="Nome"
            value="Jacques Cousteau"
          />
          <label for="For_me"></label>
          <input
            class="popup__forme"
            type="text"
            id="For_me"
            placeholder="Sobre mim"
            value="Explorador"
          />
          <button
            id="save"
            class="popup__save"
            type="button"
            aria-label="save form"
          >
            Salvar
          </button>
        </form>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
